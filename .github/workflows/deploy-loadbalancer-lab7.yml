name: Deploy Lab 7 LoadBalancer

on:
  push:
    branches:
      - main
    paths:
      - "src/LoadBalancer/**"
  workflow_dispatch:

concurrency:
  group: lab7-deploy
  cancel-in-progress: true

jobs:
  deploy-loadbalancer:
    runs-on: ubuntu-latest

    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      REMOTE_DIR: labs/lab_7

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install deploy tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Build LoadBalancer (FreeBSD)
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          usesh: true
          prepare: |
            pkg install -y cmake ninja boost-libs
          run: |
            cmake -S src/LoadBalancer -B src/LoadBalancer/build-freebsd -G Ninja
            cmake --build src/LoadBalancer/build-freebsd -j
            file src/LoadBalancer/build-freebsd/LoadBalancer

      - name: Verify built artifacts
        run: |
          test -f src/LoadBalancer/build-freebsd/LoadBalancer

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          PORT="${SSH_PORT:-2222}"
          ssh-keyscan -p "$PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Create remote directory
        run: |
          PORT="${SSH_PORT:-2222}"
          sshpass -p "$SSH_PASSWORD" ssh -p "$PORT" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "mkdir -p ~/$REMOTE_DIR"

      - name: Deploy LoadBalancer binary
        run: |
          PORT="${SSH_PORT:-2222}"
          sshpass -p "$SSH_PASSWORD" scp -P "$PORT" -o StrictHostKeyChecking=no \
            src/LoadBalancer/build-freebsd/LoadBalancer \
            "$SSH_USER@$SSH_HOST:~/$REMOTE_DIR/"

      - name: Ensure executable permissions
        run: |
          PORT="${SSH_PORT:-2222}"
          sshpass -p "$SSH_PASSWORD" ssh -p "$PORT" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "chmod +x ~/$REMOTE_DIR/LoadBalancer"

      - name: Restart lab stack
        run: |
          PORT="${SSH_PORT:-2222}"
          sshpass -p "$SSH_PASSWORD" ssh -p "$PORT" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "cd ~/$REMOTE_DIR && pkill -f 'DragonsDB-server.jar|LoadBalancer' || true; mkdir -p logs; nohup ./start.sh >logs/bootstrap.log 2>&1 &"

      - name: Check remote stack status
        run: |
          PORT="${SSH_PORT:-2222}"
          sshpass -p "$SSH_PASSWORD" ssh -p "$PORT" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "sleep 4; cd ~/$REMOTE_DIR; echo '--- processes ---'; pgrep -af 'DragonsDB-server.jar|LoadBalancer' || true; echo '--- bootstrap log ---'; tail -n 120 logs/bootstrap.log || true; echo '--- loadbalancer log ---'; tail -n 80 logs/loadbalancer.log || true"
