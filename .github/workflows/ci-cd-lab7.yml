name: CI/CD Lab 7 Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      REMOTE_DIR: labs/lab_7

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install deploy tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Build with autobuild.sh
        run: |
          chmod +x assembly/autobuild.sh
          cd assembly
          ./autobuild.sh

      - name: Verify built artifacts
        run: |
          test -f assembly/common/target/DragonsDB-common.jar
          test -f assembly/client/target/DragonsDB-client.jar
          test -f assembly/server/target/DragonsDB-server.jar

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          PORT="${SSH_PORT:-2222}"
          ssh-keyscan -p "$PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Create remote directory
        run: |
          PORT="${SSH_PORT:-2222}"
          sshpass -p "$SSH_PASSWORD" ssh -p "$PORT" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "mkdir -p ~/$REMOTE_DIR"

      - name: Deploy jars to server
        run: |
          PORT="${SSH_PORT:-2222}"
          sshpass -p "$SSH_PASSWORD" scp -P "$PORT" -o StrictHostKeyChecking=no \
            assembly/common/target/DragonsDB-common.jar \
            assembly/client/target/DragonsDB-client.jar \
            assembly/server/target/DragonsDB-server.jar \
            "$SSH_USER@$SSH_HOST:~/$REMOTE_DIR/"

      - name: Show remote lab_7 contents
        run: |
          PORT="${SSH_PORT:-2222}"
          sshpass -p "$SSH_PASSWORD" ssh -p "$PORT" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "ls -lh ~/$REMOTE_DIR"
